name: zenodo-release

on:
  workflow_dispatch:
    inputs:
      zenodo_doi:
        description: "Zenodo DOI to write into CITATION.cff"
        required: false
      release_version:
        description: "Optional version string to write into CITATION.cff"
        required: false

permissions:
  contents: write

concurrency:
  group: zenodo-${{ github.repository }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  update_citation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          DOI_INPUT="${{ github.event.inputs.zenodo_doi }}"
          VERSION_INPUT="${{ github.event.inputs.release_version }}"
          TODAY=$(date +%Y-%m-%d)

          CURRENT_DOI=$(grep -E '^doi:' CITATION.cff | head -n 1 | sed 's/^doi:[[:space:]]*//; s/"//g' || true)
          CURRENT_VERSION=$(grep -E '^version:' CITATION.cff | head -n 1 | sed 's/^version:[[:space:]]*//; s/"//g' || true)

          DOI="${DOI_INPUT:-$CURRENT_DOI}"
          VERSION="${VERSION_INPUT:-$CURRENT_VERSION}"

          if [ -z "$DOI" ]; then
            echo "No DOI available. Supply workflow input zenodo_doi or add doi to CITATION.cff." >&2
            exit 1
          fi

          if [ -z "$VERSION" ]; then
            VERSION="${GITHUB_REF_NAME:-manual}"
          fi

          echo "doi=$DOI" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"

      - name: Normalize CITATION.cff
        shell: bash
        run: |
          set -euo pipefail
          python3 - "${{ steps.meta.outputs.doi }}" "${{ steps.meta.outputs.version }}" "${{ steps.meta.outputs.today }}" "${{ github.repository }}" <<'PY'
          import pathlib
          import re
          import sys

          doi, version, date_released, repo = sys.argv[1:]
          path = pathlib.Path("CITATION.cff")
          content = path.read_text(encoding="utf-8")

          updates = {
              "doi": f"\"{doi}\"",
              "url": f"\"https://doi.org/{doi}\"",
              "version": f"\"{version}\"",
              "date-released": f"\"{date_released}\"",
              "repository-code": f"\"https://github.com/{repo}\"",
          }

          for key, value in updates.items():
              pattern = rf"^{re.escape(key)}:.*$"
              if re.search(pattern, content, flags=re.MULTILINE):
                  content = re.sub(pattern, f"{key}: {value}", content, flags=re.MULTILINE)
              else:
                  if not content.endswith("\n"):
                      content += "\n"
                  content += f"{key}: {value}\n"

          path.write_text(content, encoding="utf-8")
          PY

      - name: Commit CITATION.cff if changed
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CITATION.cff
          git diff --staged --quiet || git commit -m "chore: sync CITATION.cff with Zenodo DOI ${{ steps.meta.outputs.doi }}"
          git push

      - name: Summary
        shell: bash
        run: |
          echo "## Zenodo release sync" >> "$GITHUB_STEP_SUMMARY"
          echo "- Repository: \`${{ github.repository }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- DOI: \`${{ steps.meta.outputs.doi }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: \`${{ steps.meta.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Date released: \`${{ steps.meta.outputs.today }}\`" >> "$GITHUB_STEP_SUMMARY"
