name: Zenodo DOI Auto-Update

on:
  release:
    types: [published]

jobs:
  update-doi:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Wait for Zenodo to process release
        run: |
          echo "Waiting 90s for Zenodo webhook..."
          sleep 90

      - name: Fetch DOI from Zenodo API
        id: zn
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          # Search by GitHub repo URL
          Q=$(python3 -c "import urllib.parse; print(urllib.parse.quote('related_identifier:https://github.com/Secret-Uzbek/AIUZ-terra-codex-FMP'))")
          RESP=$(curl -s -H "Authorization: Bearer $ZENODO_TOKEN" \
            "https://zenodo.org/api/records?q=$Q&size=5&sort=mostrecent")
          DOI=$(echo "$RESP" | python3 -c "
import sys, json
try:
    d = json.load(sys.stdin)
    hits = d.get('hits', {}).get('hits', [])
    print(hits[0]['doi'] if hits and 'doi' in hits[0] else '')
except:
    print('')
" 2>/dev/null || echo "")
          echo "doi=$DOI" >> $GITHUB_OUTPUT
          echo "Found DOI: $DOI"

      - name: Retry DOI fetch if empty (Zenodo can be slow)
        id: zn2
        if: steps.zn.outputs.doi == ''
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          echo "DOI not found yet, waiting another 60s..."
          sleep 60
          Q=$(python3 -c "import urllib.parse; print(urllib.parse.quote('related_identifier:https://github.com/Secret-Uzbek/AIUZ-terra-codex-FMP'))")
          RESP=$(curl -s -H "Authorization: Bearer $ZENODO_TOKEN" \
            "https://zenodo.org/api/records?q=$Q&size=5&sort=mostrecent")
          DOI=$(echo "$RESP" | python3 -c "
import sys, json
try:
    d = json.load(sys.stdin)
    hits = d.get('hits', {}).get('hits', [])
    print(hits[0]['doi'] if hits and 'doi' in hits[0] else '')
except:
    print('')
" 2>/dev/null || echo "")
          echo "doi=$DOI" >> $GITHUB_OUTPUT
          echo "Retry DOI: $DOI"

      - name: Set final DOI
        id: final
        run: |
          DOI="${{ steps.zn.outputs.doi }}"
          if [ -z "$DOI" ]; then
            DOI="${{ steps.zn2.outputs.doi }}"
          fi
          echo "doi=$DOI" >> $GITHUB_OUTPUT

      - name: Update or create CITATION.cff
        if: steps.final.outputs.doi != ''
        run: |
          DOI="${{ steps.final.outputs.doi }}"
          TAG="${{ github.event.release.tag_name }}"
          DATE=$(date +%Y-%m-%d)
          if [ -f CITATION.cff ]; then
            # Update doi line (commented or existing)
            if grep -q "^# doi:" CITATION.cff; then
              sed -i "s|^# doi:.*|doi: \"$DOI\"|" CITATION.cff
            elif grep -q "^doi:" CITATION.cff; then
              sed -i "s|^doi:.*|doi: \"$DOI\"|" CITATION.cff
            else
              echo "doi: \"$DOI\"" >> CITATION.cff
            fi
            # Update version
            sed -i "s|^version:.*|version: \"$TAG\"|" CITATION.cff
            # Update date
            sed -i "s|^date-released:.*|date-released: \"$DATE\"|" CITATION.cff
          else
            cat > CITATION.cff << EOF
cff-version: 1.2.0
message: "If you use this software, please cite it."
type: software
title: "AIUZ-terra-codex-FMP"
authors:
  - family-names: Abdukarimov
    given-names: Abdurashid
    orcid: "https://orcid.org/0009-0000-6394-4912"
    affiliation: "Fractal Metascience Foundation, Tashkent, Uzbekistan"
repository-code: "https://github.com/Secret-Uzbek/AIUZ-terra-codex-FMP"
url: "https://fractal-metascience.org"
keywords:
  - fractal-metascience
  - fmp
  - uzbekistan
  - open-science
license: CC-BY-4.0
version: "$TAG"
date-released: "$DATE"
doi: "$DOI"
EOF
          fi

      - name: Commit updated CITATION.cff
        if: steps.final.outputs.doi != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CITATION.cff
          git diff --staged --quiet || git commit -m "ci: update CITATION.cff — Zenodo DOI ${{ steps.final.outputs.doi }} [${{ github.event.release.tag_name }}]"
          git push

      - name: Summary
        run: |
          DOI="${{ steps.final.outputs.doi }}"
          if [ -n "$DOI" ]; then
            echo "✅ DOI registered: https://doi.org/$DOI"
          else
            echo "⚠️ DOI not found — check Zenodo manually: https://zenodo.org/search?q=AIUZ-terra-codex-FMP"
          fi
