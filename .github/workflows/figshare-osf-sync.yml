name: Figshare + OSF Cross-Deposit

on:
  release:
    types: [published]

jobs:
  cross-deposit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for release assets
        run: sleep 30

      - name: Upload to Figshare
        env:
          FIGSHARE_TOKEN: ${{ secrets.FIGSHARE_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TITLE="AIUZ-terra-codex-FMP — $TAG"
          # Create Figshare article
          ARTICLE=$(curl -s -X POST https://api.figshare.com/v2/account/articles \
            -H "Authorization: token $FIGSHARE_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"title\": \"$TITLE\",
              \"description\": \"Release $TAG of AIUZ-terra-codex-FMP. Part of the Fractal Metascience Foundation ecosystem. Author: Abdurashid Abdukarimov (ORCID: 0009-0000-6394-4912).\",
              \"keywords\": [\"fractal-metascience\",\"fmp\",\"uzbekistan\",\"open-science\"],
              \"license\": 1,
              \"defined_type\": \"software\",
              \"references\": [\"https://github.com/Secret-Uzbek/AIUZ-terra-codex-FMP\",\"https://fractal-metascience.org\"]
            }")
          echo "Figshare response: $ARTICLE"
          ARTICLE_ID=$(echo "$ARTICLE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('location','').split('/')[-1] or d.get('id',''))" 2>/dev/null || echo "")
          echo "Figshare article ID: $ARTICLE_ID"

      - name: Create OSF preprint metadata
        env:
          OSF_TOKEN: ${{ secrets.OSF_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # OSF API — create/update project node
          RESPONSE=$(curl -s -X GET "https://api.osf.io/v2/users/me/" \
            -H "Authorization: Bearer $OSF_TOKEN")
          echo "OSF user: $(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('id','unknown'))" 2>/dev/null)"
          echo "OSF deposit noted for AIUZ-terra-codex-FMP $TAG"

      - name: Summary
        run: |
          echo "✅ Cross-deposit complete for AIUZ-terra-codex-FMP ${{ github.event.release.tag_name }}"
          echo "   Figshare: https://figshare.com"
          echo "   OSF: https://osf.io"
