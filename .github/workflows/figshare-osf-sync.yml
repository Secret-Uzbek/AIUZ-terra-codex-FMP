name: Figshare & OSF Sync

on:
  workflow_dispatch:

jobs:
  sync-figshare-osf:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload to Figshare
        env:
          FIGSHARE_TOKEN: ${{ secrets.FIGSHARE_SYNC_TOKEN || secrets.FIGSHARE_TOKEN }}
        run: |
          if [ -z "$FIGSHARE_TOKEN" ]; then
            echo "FIGSHARE_TOKEN not set, skipping"
            exit 0
          fi
          echo "Manual Figshare sync entrypoint is ready."

      - name: Register on OSF
        env:
          OSF_TOKEN: ${{ secrets.OSF_SYNC_TOKEN || secrets.OSF_TOKEN }}
        run: |
          if [ -z "$OSF_TOKEN" ]; then
            echo "OSF_TOKEN not set, skipping"
            exit 0
          fi
          echo "Manual OSF sync entrypoint is ready."
