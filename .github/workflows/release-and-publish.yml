name: Release and Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release bundle
        run: |
          zip -r aiuz-terra-codex-fmp-${GITHUB_REF_NAME}.zip . \
            -x ".git/*" ".github/*"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: aiuz-terra-codex-fmp-${{ github.ref_name }}.zip
